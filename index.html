<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stellar Resolve - A journey home through the stars. A browser-based 2D space shooter about healing from heartbreak.">
  <meta name="keywords" content="space shooter, phaser 3, typescript, browser game, indie game">
  <meta name="author" content="Stellar Resolve Team">
  
  <title>Stellar Resolve - Journey Home</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
      font-family: 'Courier New', monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      position: relative;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.3),
                  0 0 100px rgba(0, 255, 255, 0.1);
      border: 3px solid #00ffff;
      background: #0a0a1a;
      cursor: default;
    }

    /* Ensure Phaser canvas is clickable */
    #game-container canvas {
      display: block;
      cursor: inherit;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 1000;
      background: rgba(10, 10, 26, 0.95);
      padding: 40px 60px;
      border: 3px solid #00ffff;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
    }

    #loading h1 {
      font-size: 36px;
      color: #00ffff;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
      letter-spacing: 4px;
    }

    #loading p {
      font-size: 16px;
      color: #ffffff;
      font-style: italic;
      margin-bottom: 30px;
    }

    .loading-bar {
      width: 300px;
      height: 20px;
      background: #000000;
      border: 2px solid #00ffff;
      position: relative;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ffff 0%, #ff00ff 100%);
      width: 0%;
      animation: loading 2s ease-in-out infinite;
    }

    @keyframes loading {
      0%, 100% { width: 0%; }
      50% { width: 100%; }
    }

    .hidden {
      display: none;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 26, 0.8);
      padding: 15px 30px;
      border: 2px solid #00ffff;
      border-radius: 5px;
      font-size: 12px;
      color: #ffffff;
      z-index: 100;
    }

    #controls span {
      color: #00ffff;
      font-weight: bold;
    }

    @media (max-width: 1400px) {
      #game-container {
        transform: scale(0.9);
      }
    }

    @media (max-width: 1200px) {
      #game-container {
        transform: scale(0.8);
      }
    }

    @media (max-width: 900px) {
      #game-container {
        transform: scale(0.6);
      }
      
      #controls {
        font-size: 10px;
        padding: 10px 20px;
      }
    }

    .accessibility-notice {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(10, 10, 26, 0.9);
      padding: 10px 15px;
      border: 2px solid #00ffff;
      font-size: 11px;
      max-width: 250px;
      z-index: 50;
    }

    .neo-brutal-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .neo-brutal-bg::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 5%;
      width: 200px;
      height: 200px;
      background: rgba(0, 255, 255, 0.05);
      border: 3px solid rgba(0, 255, 255, 0.2);
      transform: rotate(45deg);
    }

    .neo-brutal-bg::after {
      content: '';
      position: absolute;
      bottom: 15%;
      right: 8%;
      width: 150px;
      height: 150px;
      background: rgba(255, 0, 255, 0.05);
      border: 3px solid rgba(255, 0, 255, 0.2);
      transform: rotate(-30deg);
    }
  </style>
</head>
<body>
  <div class="neo-brutal-bg"></div>
  
  <div id="app">
    <div id="loading">
      <h1>STELLAR RESOLVE</h1>
      <p>"If anything can go wrong, it will."</p>
      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>
    </div>
    
    <div id="game-container"></div>
    
    <div id="controls" class="hidden">
      <span>WASD</span> Move | <span>MOUSE</span> Aim | <span>LEFT CLICK</span> Fire | <span>RIGHT CLICK</span> Charged Shot | <span>ESC</span> Pause
    </div>

    <div class="accessibility-notice hidden" id="accessibility-notice">
      Accessibility options available in Settings. Includes reduced motion, color-blind modes, and adjustable volumes.
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
  
  <script>
    // Show game after short delay
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading');
        const controls = document.getElementById('controls');
        const notice = document.getElementById('accessibility-notice');
        
        if (loading) loading.classList.add('hidden');
        if (controls) controls.classList.remove('hidden');
        if (notice) {
          notice.classList.remove('hidden');
          setTimeout(() => notice.classList.add('hidden'), 10000);
        }
      }, 2000);
    });

    // Service worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {
          console.log('Service worker registration skipped');
        });
      });
    }
    
    // Handle game errors gracefully
    window.addEventListener('error', (e) => {
      console.error('Game error:', e.error);
    });
    
    window.addEventListener('unhandledrejection', (e) => {
      console.error('Unhandled promise rejection:', e.reason);
    });
  </script>
</body>
</html>
